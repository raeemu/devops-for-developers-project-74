services:
  caddy:
    image: caddy:2-alpine
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: make dev
    volumes:
      - ./app:/app
    ports:
      - "8080:8080"